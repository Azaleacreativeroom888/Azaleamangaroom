<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Blog</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f5f5;
}

header {
  background: #fff;
  padding: 15px 30px;
  border-bottom: 1px solid #ddd;
  font-weight: bold;
}

.container {
  display: flex;
  max-width: 1100px;
  margin: 20px auto;
  gap: 20px;
}

.main {
  flex: 3;
}

.card {
  background: #fff;
  margin-bottom: 20px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-3px);
}

.card img {
  width: 100%;
}

.card-content {
  padding: 15px;
}

.date {
  font-size: 12px;
  color: gray;
}

.title {
  font-size: 18px;
  margin: 10px 0;
  font-weight: bold;
}

.button {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background: #333;
  color: white;
  border-radius: 5px;
  text-decoration: none;
}

/* サイドバー */
.sidebar {
  flex: 1;
}

.pickup {
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.pickup h3 {
  margin-top: 0;
}

.pickup-item {
  margin-bottom: 10px;
}

.pickup-item a {
  text-decoration: none;
  color: #333;
  font-size: 14px;
}
</style>
</head>

<body>

<header>My Blog</header>

<div class="container">

  <!-- メイン -->
  <div class="main">

    <div class="card">
      <img src="sample1.jpg">
      <div class="card-content">
        <div class="date">2026年4月15日</div>
        <div class="title">見たものいろいろ</div>
          <p>家族につまんないって言われたギャグ漫画。ボツにした～～（泣）</p>
          <img src="clipstudio1.png" alt="ボツのギャグ漫画">
      </div>
    </div>

  </div>

  <!-- サイド -->
  <div class="sidebar">

    <div class="pickup">
      <h3>過去の記事</h3>

      <div class="pickup-item">
        <a href="blog2026.html">▶ ブログ 2026年</a>
      </div>

      <div class="pickup-item">
        <a href="blog2025.html">▶ ブログ 2025年</a>
      </div>

      <div class="pickup-item">
        <a href="pregress.html">▶ 進捗ノート</a>
      </div>

    </div>

  </div>

</div>

</body>
</html>
