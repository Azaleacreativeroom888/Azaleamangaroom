<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>激弱勇者 - 第1話</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Noto+Serif+JP:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9922a;
    --gold-light: #e8c060;
    --ink-bg: #1a0e08;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  body {
    font-family: 'Noto Serif JP', 'メイリオ', serif;
    color: #e8d5a3;
  }

  .reader-topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 52px;
    background: linear-gradient(180deg, rgba(10,8,5,0.92), transparent);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 50;
    transition: opacity 0.3s;
  }

  .reader-topbar.hidden { opacity: 0; pointer-events: none; }

  .reader-title {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--gold-light);
  }

  .reader-back {
    text-decoration: none;
    color: #c8b070;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 5px 12px;
    border: 1px solid rgba(201,146,42,0.3);
    border-radius: 3px;
    transition: all 0.2s;
  }

  .reader-back:hover {
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .reader-stage {
    height: 100%;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .spread {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    max-width: 100vw;
  }

  .spread img {
    max-height: 100vh;
    max-width: 50vw;
    object-fit: contain;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  .spread.solo img {
    max-width: 100vw;
  }

  .tap-zone {
    position: absolute;
    top: 0; bottom: 0;
    width: 35%;
    z-index: 20;
    cursor: pointer;
    display: flex;
    align-items: center;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .tap-zone:hover { opacity: 1; }

  .tap-zone.right {
    right: 0;
    justify-content: flex-end;
    background: linear-gradient(to left, rgba(0,0,0,0.35), transparent);
    padding-right: 14px;
  }

  .tap-zone.left {
    left: 0;
    justify-content: flex-start;
    background: linear-gradient(to right, rgba(0,0,0,0.35), transparent);
    padding-left: 14px;
  }

  .tap-arrow {
    font-size: 26px;
    color: var(--gold-light);
    text-shadow: 0 0 10px rgba(0,0,0,0.8);
  }

  .tap-zone.center {
    left: 35%;
    right: 35%;
    z-index: 15;
    background: none;
  }

  .reader-bottombar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 14px 16px 18px;
    background: linear-gradient(0deg, rgba(10,8,5,0.92), transparent);
    z-index: 50;
    transition: opacity 0.3s;
  }

  .reader-bottombar.hidden { opacity: 0; pointer-events: none; }

  .page-counter {
    text-align: center;
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: #a89060;
    margin-bottom: 8px;
  }

  .progress-track {
    max-width: 320px;
    margin: 0 auto;
    height: 4px;
    background: rgba(201,146,42,0.15);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
    direction: rtl;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.25s ease;
  }

  .hint-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
    text-align: center;
    padding: 24px;
  }

  .hint-overlay.gone { display: none; }

  .hint-row {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .hint-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .hint-item .arrow {
    font-size: 32px;
    color: var(--gold-light);
  }

  .hint-item span.label {
    font-size: 12px;
    color: #a89060;
    letter-spacing: 1px;
  }

  .hint-title {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--gold-light);
    letter-spacing: 3px;
  }

  .hint-sub {
    font-size: 12px;
    color: #7a6040;
    max-width: 260px;
    line-height: 1.8;
  }

  .hint-close {
    margin-top: 6px;
    padding: 9px 28px;
    background: linear-gradient(135deg, rgba(42,72,53,0.85), rgba(26,48,32,0.9));
    border: 1px solid rgba(201,146,42,0.45);
    border-radius: 3px;
    color: var(--gold-light);
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
  }

  .end-card {
    position: fixed;
    inset: 0;
    background: rgba(8,6,4,0.95);
    z-index: 80;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
    text-align: center;
    padding: 24px;
  }

  .end-card.show { display: flex; }

  .end-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    color: var(--gold-light);
    letter-spacing: 3px;
  }

  .end-sub {
    font-size: 13px;
    color: #a89060;
  }

  .end-links {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .end-btn {
    text-decoration: none;
    padding: 10px 22px;
    border: 1px solid rgba(201,146,42,0.4);
    border-radius: 3px;
    color: var(--gold-light);
    font-size: 13px;
    letter-spacing: 1px;
    transition: all 0.25s;
    background: linear-gradient(135deg, rgba(42,72,53,0.6), rgba(26,48,32,0.7));
  }

  .end-btn:hover {
    border-color: var(--gold);
    background: linear-gradient(135deg, rgba(60,100,70,0.75), rgba(42,72,53,0.85));
  }

  @media (max-width: 768px) {
    .spread img { max-width: 100vw; }
    .spread.pair img { max-width: 100vw; }
    .spread.pair img:first-child { display: none; }
  }
</style>
</head>

<body>

<div class="reader-topbar" id="topbar">
  <a class="reader-back" href="manga.html">← 一覧</a>
  <span class="reader-title">激弱勇者 — 第1話</span>
  <span style="width:50px;"></span>
</div>

<div class="reader-stage" id="stage">

  <div class="spread" id="spreadWrap"></div>

  <div class="tap-zone right" onclick="prevPage()" aria-label="前のページへ">
    <span class="tap-arrow">›</span>
  </div>
  <div class="tap-zone center" onclick="toggleBars()"></div>
  <div class="tap-zone left" onclick="nextPage()" aria-label="次のページへ">
    <span class="tap-arrow">‹</span>
  </div>
</div>

<div class="reader-bottombar" id="bottombar">
  <p class="page-counter" id="pageCounter">1 / 4</p>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill" style="width: 25%;"></div>
  </div>
</div>

<div class="hint-overlay" id="hintOverlay">
  <p class="hint-title">✦ 右から左へ読みます ✦</p>
  <p class="hint-sub">1ページ目は単独、2ページ目以降は見開きで表示されます（日本の単行本と同じ綴じ方）</p>
  <div class="hint-row">
    <div class="hint-item">
      <span class="arrow">›</span>
      <span class="label">タップで戻る</span>
    </div>
    <div class="hint-item">
      <span class="arrow">‹</span>
      <span class="label">タップで進む</span>
    </div>
  </div>
  <button class="hint-close" onclick="closeHint()">読み始める</button>
</div>

<div class="end-card" id="endCard">
  <p class="end-title">― 第1話 終わり ―</p>
  <p class="end-sub">読んでくれてありがとうございます！</p>
  <div class="end-links">
    <a class="end-btn" href="manga1-2.html">第2話へ ›</a>
    <a class="end-btn" href="manga.html">一覧に戻る</a>
  </div>
</div>

<script>
  const pages = [
    'manga1-page1.jpg',
    'manga1-page2.jpg',
    'manga1-page3.jpg',
    'manga1-page4.jpg'
  ];

  const total = pages.length;

  function buildSpreads() {
    const spreads = [];
    if (total === 0) return spreads;

    spreads.push({ type: 'solo', indices: [0] });

    let i = 1;
    while (i < total) {
      if (i + 1 < total) {
        spreads.push({ type: 'pair', indices: [i, i + 1] });
        i += 2;
      } else {
        spreads.push({ type: 'solo', indices: [i] });
        i += 1;
      }
    }
    return spreads;
  }

  const spreads = buildSpreads();
  let spreadIndex = 0;

  const wrap = document.getElementById('spreadWrap');
  const counter = document.getElementById('pageCounter');
  const fill = document.getElementById('progressFill');
  const endCard = document.getElementById('endCard');

  function render() {
    const s = spreads[spreadIndex];
    wrap.className = 'spread ' + s.type;
    wrap.innerHTML = '';

    if (s.type === 'solo') {
      const img = document.createElement('img');
      img.src = pages[s.indices[0]];
      img.alt = 'ページ ' + (s.indices[0] + 1);
      wrap.appendChild(img);
    } else {
      const leftImg = document.createElement('img');
      leftImg.src = pages[s.indices[1]];
      leftImg.alt = 'ページ ' + (s.indices[1] + 1);

      const rightImg = document.createElement('img');
      rightImg.src = pages[s.indices[0]];
      rightImg.alt = 'ページ ' + (s.indices[0] + 1);

      wrap.appendChild(leftImg);
      wrap.appendChild(rightImg);
    }

    const firstNum = s.indices[0] + 1;
    const lastNum = s.indices[s.indices.length - 1] + 1;
    counter.textContent = (firstNum === lastNum)
      ? (firstNum + ' / ' + total)
      : (firstNum + '-' + lastNum + ' / ' + total);

    fill.style.width = ((lastNum / total) * 100) + '%';

    pages.forEach((p) => { const pre = new Image(); pre.src = p; });
  }

  function nextPage() {
    if (spreadIndex < spreads.length - 1) {
      spreadIndex++;
      render();
    } else {
      endCard.classList.add('show');
    }
  }

  function prevPage() {
    endCard.classList.remove('show');
    if (spreadIndex > 0) {
      spreadIndex--;
      render();
    }
  }

  let barsVisible = true;
  function toggleBars() {
    barsVisible = !barsVisible;
    document.getElementById('topbar').classList.toggle('hidden', !barsVisible);
    document.getElementById('bottombar').classList.toggle('hidden', !barsVisible);
  }

  function closeHint() {
    document.getElementById('hintOverlay').classList.add('gone');
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') nextPage();
    if (e.key === 'ArrowRight') prevPage();
    if (e.key === 'Escape') closeHint();
  });

  let touchStartX = null;
  document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; });
  document.addEventListener('touchend', (e) => {
    if (touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) nextPage();
      else prevPage();
    }
    touchStartX = null;
  });

  render();
</script>

</body>
</html>
